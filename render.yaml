# ─── Render Blueprint ────────────────────────────────────────────────────────
# Deploys the API as a Docker web service on Render's free tier.
#
# DATABASE_URL must be set manually in the Render dashboard to point at a
# pgvector-compatible PostgreSQL instance (e.g. Neon free tier).
# Render's own free Postgres does NOT support pgvector; however, even if
# pgvector is absent the migration will skip the embedding column gracefully
# and all endpoints except /search will work normally.
# ─────────────────────────────────────────────────────────────────────────────

services:
  - type: web
    name: housing-api
    env: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false          # set manually — paste your Neon / Supabase connection string
      - key: SECRET_KEY
        generateValue: true
      - key: GROQ_API_KEY
        sync: false
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"
      - key: DEMO_USERNAME
        value: admin
      - key: DEMO_PASSWORD
        sync: false
